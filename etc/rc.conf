# Add to end of /etc/rc.conf

# kld_list="e6000sw"         # This is specific to v16.0

ifconfig_ix0="up"
ifconfig_ix1="up"

# IMPORTANT - The port configuration MUST MATCH the config_switch.sh script!

# This is the 4x4 configuration where 4 ports are bound to ix0 and 4 ports are bound to ix1
vlans_ix0="port0 port1 port2 port3"
vlans_ix1="port4 port5 port6 port7"

# This is the standard firewall 1x7 config where 1 port is bound to ix0 and the remaining are bound to ix1
# vlans_ix0="port0"
# vlans_ix1="port1 port2 port3 port4 port5 port6 port7"

create_args_port0="vlan 110"
create_args_port1="vlan 120"
create_args_port2="vlan 130"
create_args_port3="vlan 140"
create_args_port4="vlan 150"
create_args_port5="vlan 160"
create_args_port6="vlan 170"
create_args_port7="vlan 180"

ifconfig_port0="dhcp"

config_switch_enable="YES"
